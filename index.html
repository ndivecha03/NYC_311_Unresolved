<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC 311 — Unsolved Complaints</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#0a0c10;--surface:#12151c;--surface2:#1a1e27;--border:rgba(255,255,255,0.06);--text:#eeecea;--muted:#6b7180;--accent:#e85d3a;--fh:'Syne',sans-serif;--fm:'DM Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}

body{background:var(--bg);color:var(--text);font-family:var(--fm);overflow:hidden;}

/* ── LAYOUT ── */
.shell{display:flex;flex-direction:column;position:fixed;inset:0;overflow:hidden;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;border-bottom:1px solid var(--border);flex-shrink:0;height:52px;min-height:52px;}
.topbar-title{font-family:var(--fh);font-size:1.2rem;font-weight:800;letter-spacing:-0.02em;}
.topbar-title span{color:var(--accent);}
.topbar-meta{font-size:0.62rem;color:var(--muted);}
.topbar-pills{display:flex;gap:6px;}

.content{display:grid;grid-template-columns:1fr 380px;position:absolute;top:52px;left:0;right:0;bottom:0;overflow:hidden;}
.map-wrap{position:relative;overflow:hidden;background:var(--bg);}
#map-svg{position:absolute;top:0;left:0;}

/* ── SIDE PANEL ── */
.side{display:flex;flex-direction:column;border-left:1px solid var(--border);overflow:hidden;background:var(--surface);height:100%;}
.side-head{padding:1rem 1.25rem 0.75rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.side-head h2{font-family:var(--fh);font-size:0.85rem;font-weight:700;margin-bottom:0.5rem;}
.side-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat-card{background:var(--surface2);border-radius:6px;padding:0.6rem 0.8rem;}
.stat-label{font-size:0.58rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:3px;}
.stat-val{font-family:var(--fh);font-size:1.1rem;font-weight:700;}
.stat-sub{font-size:0.6rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.zip-list-wrap{flex:1;overflow-y:auto;}
.zip-list-head{padding:0.65rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:2;}
.zip-list-head span{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);}
.zip-list{list-style:none;}
.zip-row{display:grid;grid-template-columns:24px 1fr auto;align-items:center;gap:8px;padding:0.5rem 1.25rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s;}
.zip-row:hover{background:var(--surface2);}
.zip-row.active{background:rgba(232,93,58,0.08);border-left:2px solid var(--accent);}
.zr-num{font-size:0.58rem;color:var(--muted);text-align:right;font-family:var(--fh);font-weight:700;}
.zr-zip{font-family:var(--fh);font-size:0.8rem;font-weight:700;}
.zr-bar-bg{width:50px;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-top:3px;}
.zr-bar{height:100%;border-radius:2px;}
.zr-count{font-size:0.68rem;font-weight:500;text-align:right;min-width:36px;}

.bottom-chart{border-top:1px solid var(--border);padding:0.85rem 1.25rem;flex-shrink:0;background:var(--surface);}
.bc-title{font-size:0.58rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:0.6rem;}
.bc-wrap{position:relative;height:90px;}

/* ── TOOLTIP ── */
.map-tip{position:absolute;background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);padding:0.55rem 0.85rem;font-size:0.7rem;pointer-events:none;opacity:0;transition:opacity 0.12s;min-width:160px;z-index:20;}
.mt-boro{font-size:0.58rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);}
.mt-zip{font-family:var(--fh);font-size:0.95rem;font-weight:700;margin:2px 0;}
.mt-count{color:var(--accent);font-weight:500;}
.mt-top{font-size:0.6rem;color:var(--muted);margin-top:3px;}

/* ── ZIP DRAWER (slides up from bottom of map) ── */
.zip-drawer{position:absolute;left:0;right:0;bottom:0;height:260px;background:var(--surface);border-top:1px solid var(--border);transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);z-index:15;display:flex;flex-direction:column;}
.zip-drawer.open{transform:translateY(0);}
.zd-head{display:flex;align-items:center;gap:1rem;padding:0.85rem 1.25rem 0.7rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.zd-zip{font-family:var(--fh);font-size:1.4rem;font-weight:800;letter-spacing:-0.03em;}
.zd-boro{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-top:2px;}
.zd-total{font-size:0.75rem;margin-top:1px;}
.zd-total span{font-weight:500;}
.zd-close{margin-left:auto;background:none;border:1px solid var(--border);color:var(--muted);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:0.85rem;display:flex;align-items:center;justify-content:center;font-family:var(--fm);transition:all 0.15s;}
.zd-close:hover{border-color:var(--accent);color:var(--accent);}
.zd-body{display:grid;grid-template-columns:1fr 220px;flex:1;overflow:hidden;}
.zd-bars{padding:0.75rem 1.25rem;overflow-y:auto;}
.zd-chart-wrap{border-left:1px solid var(--border);padding:0.75rem 1rem;position:relative;}

.cbar-item{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.cbar-rank{font-size:0.56rem;color:var(--muted);width:14px;flex-shrink:0;font-family:var(--fh);font-weight:700;}
.cbar-label{font-size:0.68rem;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cbar-count{font-size:0.63rem;color:var(--muted);flex-shrink:0;min-width:28px;text-align:right;}
.cbar-track{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-left:22px;margin-top:-5px;margin-bottom:2px;}
.cbar-fill{height:100%;border-radius:2px;}

/* ── LEGEND ── */
.map-legend{position:absolute;bottom:1rem;left:1rem;font-size:0.6rem;color:var(--muted);z-index:5;pointer-events:none;}
.leg-grad{display:flex;align-items:center;gap:5px;margin-top:3px;}
.leg-swatch{width:80px;height:5px;border-radius:2px;background:linear-gradient(to right,#1a2030,#e85d3a);}

/* borough pill buttons */
.bpill{font-size:0.6rem;padding:4px 10px;border-radius:20px;border:1px solid var(--border);cursor:pointer;transition:all 0.15s;color:var(--muted);background:transparent;font-family:var(--fm);text-transform:uppercase;letter-spacing:0.08em;}
.bpill:hover{border-color:rgba(255,255,255,0.2);color:var(--text);}
.bpill.active{color:#fff;}
</style>
</head>
<body>
<div class="shell">

  <!-- topbar -->
  <div class="topbar">
    <div class="topbar-title">NYC 311 <span>Unsolved</span></div>
    <div class="topbar-pills" id="bpills"></div>
    <div class="topbar-meta">Open · Assigned · Pending · In Progress</div>
  </div>

  <!-- main content -->
  <div class="content">

    <!-- MAP -->
    <div class="map-wrap" id="mapWrap">
      <svg id="map-svg"></svg>
      <div class="map-tip" id="mTip"></div>
      <div class="map-legend"><div>complaint volume</div><div class="leg-grad"><span>low</span><div class="leg-swatch"></div><span>high</span></div></div>

      <!-- ZIP drawer slides up from bottom of map -->
      <div class="zip-drawer" id="zipDrawer">
        <div class="zd-head">
          <div>
            <div class="zd-zip" id="zd-zip">—</div>
            <div class="zd-boro" id="zd-boro">—</div>
            <div class="zd-total">Unsolved: <span id="zd-total">—</span></div>
          </div>
          <button class="zd-close" onclick="closeDrawer()">✕</button>
        </div>
        <div class="zd-body">
          <div class="zd-bars" id="zd-bars"></div>
          <div class="zd-chart-wrap"><canvas id="zdChart"></canvas></div>
        </div>
      </div>
    </div>

    <!-- SIDE PANEL -->
    <div class="side">
      <div class="side-head">
        <h2 id="side-title">All Boroughs</h2>
        <div class="side-stats">
          <div class="stat-card">
            <div class="stat-label">Total Unsolved</div>
            <div class="stat-val" id="s-total">—</div>
            <div class="stat-sub" id="s-sub">across all boroughs</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Top ZIP</div>
            <div class="stat-val" id="s-topzip">—</div>
            <div class="stat-sub" id="s-topcount">—</div>
          </div>
        </div>
      </div>
      <div class="zip-list-wrap">
        <div class="zip-list-head">
          <span>ZIP Rankings</span>
          <span id="zip-count-label">—</span>
        </div>
        <ul class="zip-list" id="zipList"></ul>
      </div>
      <div class="bottom-chart">
        <div class="bc-title">By borough</div>
        <div class="bc-wrap"><canvas id="boroughChart"></canvas></div>
      </div>
    </div>

  </div>
</div>

// True DB totals (includes records with blank ZIPs, sourced directly from Snowflake)
const TRUE_BOROUGH_TOTALS={
  'BRONX':149468,'BROOKLYN':190997,'MANHATTAN':121247,'QUEENS':165721,'STATEN ISLAND':55789
};
const TRUE_GRAND_TOTAL=683222;

const BC={"BRONX":"#e85d3a","BROOKLYN":"#f0a832","MANHATTAN":"#4ea8de","QUEENS":"#52c46c","STATEN ISLAND":"#b57bee"};
const BNAMES={"BRONX":"Bronx","BROOKLYN":"Brooklyn","MANHATTAN":"Manhattan","QUEENS":"Queens","STATEN ISLAND":"Staten Island"};

let activeBorough='ALL', activeZip=null;
let zdChart=null, bChart=null;

/* ─────────────── PROJECTION ─────────────── */
function makeProj(W,H){
  return d3.geoMercator().center([-73.97,40.693]).scale(W*48).translate([W/2,H/2]);
}

/* ─────────────── SIDE PANEL ─────────────── */
function updateSide(){
  const filtered = ZIP_DATA.filter(d=>activeBorough==='ALL'||d[0]===activeBorough);
  const sorted = [...filtered].sort((a,b)=>b[2]-a[2]);
  const total = activeBorough==='ALL' ? TRUE_GRAND_TOTAL : TRUE_BOROUGH_TOTALS[activeBorough];
  const top = sorted[0];
  const color = activeBorough==='ALL'?'#e85d3a':BC[activeBorough];

  document.getElementById('side-title').textContent = activeBorough==='ALL'?'All Boroughs':BNAMES[activeBorough];
  document.getElementById('s-total').textContent = total.toLocaleString();
  document.getElementById('s-total').style.color = color;
  document.getElementById('s-sub').textContent = activeBorough==='ALL'?'across all boroughs':`in ${BNAMES[activeBorough]}`;
  if(top){
    document.getElementById('s-topzip').textContent = top[1];
    document.getElementById('s-topzip').style.color = BC[top[0]];
    document.getElementById('s-topcount').textContent = top[2].toLocaleString()+' complaints';
  }
  document.getElementById('zip-count-label').textContent = sorted.length+' zips';

  const max = sorted[0]?sorted[0][2]:1;
  document.getElementById('zipList').innerHTML = sorted.map((d,i)=>{
    const pct=Math.round((d[2]/max)*100), c=BC[d[0]];
    const isActive = d[1]===activeZip;
    return `<li class="zip-row${isActive?' active':''}" onclick="selectZip('${d[1]}','${d[0]}',${d[2]})">
      <div class="zr-num">${i+1}</div>
      <div><div class="zr-zip">${d[1]}</div><div style="font-size:0.58rem;color:var(--muted)">${d[0]}</div></div>
      <div style="text-align:right">
        <div class="zr-count" style="color:${c}">${d[2].toLocaleString()}</div>
        <div class="zr-bar-bg"><div class="zr-bar" style="width:${pct}%;background:${c}"></div></div>
      </div>
    </li>`;
  }).join('');
}

function updateBoroughChart(){
  const boros=['BRONX','BROOKLYN','MANHATTAN','QUEENS','STATEN ISLAND'];
  const ctx=document.getElementById('boroughChart').getContext('2d');
  if(bChart)bChart.destroy();
  bChart=new Chart(ctx,{type:'bar',
    data:{labels:['Bronx','Bklyn','Mnhtn','Queens','SI'],
      datasets:[{data:boros.map(b=>TRUE_BOROUGH_TOTALS[b]),
        backgroundColor:boros.map(b=>activeBorough===b||activeBorough==='ALL'?BC[b]:BC[b]+'44'),
        borderRadius:3,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y.toLocaleString()},backgroundColor:'#1a1e27',titleColor:'#eeecea',bodyColor:'#6b7180',borderColor:'rgba(255,255,255,0.06)',borderWidth:1}},
      scales:{x:{ticks:{color:'#6b7180',font:{family:'DM Mono',size:9}},grid:{display:false},border:{display:false}},
        y:{ticks:{color:'#6b7180',font:{family:'DM Mono',size:9},callback:v=>(v/1000)+'k'},grid:{color:'rgba(255,255,255,0.04)'},border:{display:false}}}}});
}

/* ─────────────── ZIP DRAWER ─────────────── */
function selectZip(zip,boro,total){
  activeZip=zip;
  const color=BC[boro];
  document.getElementById('zd-zip').textContent=zip;
  document.getElementById('zd-zip').style.color=color;
  document.getElementById('zd-boro').textContent=boro;
  document.getElementById('zd-total').textContent=total.toLocaleString();
  document.getElementById('zd-total').style.color=color;

  const complaints=COMPLAINTS[zip]||[];
  const maxC=complaints[0]?complaints[0][1]:1;
  document.getElementById('zd-bars').innerHTML=complaints.map(([t,c],i)=>{
    const pct=Math.round((c/maxC)*100);
    return `<div class="cbar-item">
      <div class="cbar-rank">${i+1}</div>
      <div class="cbar-label" title="${t}">${t}</div>
      <div class="cbar-count">${c.toLocaleString()}</div>
    </div>
    <div class="cbar-track"><div class="cbar-fill" style="width:${pct}%;background:${color}"></div></div>`;
  }).join('');

  setTimeout(()=>{
    const ctx=document.getElementById('zdChart').getContext('2d');
    if(zdChart)zdChart.destroy();
    const top6=complaints.slice(0,6);
    zdChart=new Chart(ctx,{type:'bar',
      data:{labels:top6.map(([t])=>t.length>18?t.slice(0,18)+'…':t),
        datasets:[{data:top6.map(([,c])=>c),backgroundColor:color+'cc',borderRadius:3,borderSkipped:false}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.x.toLocaleString()+' complaints'},backgroundColor:'#1a1e27',titleColor:'#eeecea',bodyColor:'#6b7180',borderColor:'rgba(255,255,255,0.06)',borderWidth:1}},
        scales:{x:{ticks:{color:'#6b7180',font:{family:'DM Mono',size:8}},grid:{color:'rgba(255,255,255,0.04)'},border:{display:false}},
          y:{ticks:{color:'#eeecea',font:{family:'DM Mono',size:8}},grid:{display:false},border:{display:false}}}}});
  },60);

  document.getElementById('zipDrawer').classList.add('open');
  updateSide();
  highlightDot(zip);
}

function closeDrawer(){
  activeZip=null;
  document.getElementById('zipDrawer').classList.remove('open');
  updateSide();
  d3.selectAll('.zip-dot').attr('stroke-width',0.5).attr('r',d=>getR(d[2])).attr('opacity',0.82);
}

function highlightDot(zip){
  d3.selectAll('.zip-dot')
    .attr('stroke-width',d=>d[1]===zip?2.5:0.5)
    .attr('r',d=>d[1]===zip?getR(d[2])*1.6:getR(d[2]))
    .attr('opacity',d=>d[1]===zip?1:0.5);
}

/* ─────────────── MAP ─────────────── */
function getR(c){return Math.sqrt(c/9639)*11+2.5;}

function renderMap(){
  const wrap=document.getElementById('mapWrap');
  const mapH=window.innerHeight-52;
  wrap.style.height=mapH+'px';
  const W=wrap.offsetWidth||window.innerWidth-380;
  const H=mapH;
  d3.select('#map-svg').attr('width',W).attr('height',H);
  const svg=d3.select('#map-svg');
  svg.selectAll('*').remove();

  const proj=makeProj(W,H);
  const path=d3.geoPath(proj);

  // dark ocean bg
  svg.append('rect').attr('width',W).attr('height',H).attr('fill','#0a0c10');

  // ── BOROUGH OUTLINES ──
  const gBoro=svg.append('g').attr('class','boroughs');
  gBoro.selectAll('.boro-fill')
    .data(NYC_BOROUGHS.features)
    .join('path')
    .attr('class','boro-fill')
    .attr('d',path)
    .attr('fill',d=>{
      const bKey=Object.keys(BC).find(k=>BNAMES[k]===d.properties.name)||d.properties.name.toUpperCase();
      const isActive=activeBorough===bKey||activeBorough==='ALL';
      return isActive?(BC[bKey]||'#4ea8de')+'14':'rgba(255,255,255,0.03)';
    })
    .attr('stroke',d=>{
      const bKey=Object.keys(BC).find(k=>BNAMES[k]===d.properties.name)||d.properties.name.toUpperCase();
      const isActive=activeBorough===bKey||activeBorough==='ALL';
      return isActive?(BC[bKey]||'#4ea8de'):'rgba(255,255,255,0.12)';
    })
    .attr('stroke-width',2)
    .attr('stroke-linejoin','round')
    .style('cursor','pointer')
    .on('click',function(event,d){
      const bKey=Object.keys(BC).find(k=>BNAMES[k]===d.properties.name)||d.properties.name.toUpperCase();
      if(activeBorough===bKey){setBorough('ALL');}else{setBorough(bKey);}
    });

  // borough name labels on outline
  // ── ZIP DOTS drawn here, labels appended after ──

  // ── ZIP DOTS ──
  const filtered=ZIP_DATA.filter(d=>(activeBorough==='ALL'||d[0]===activeBorough)&&d[3]&&d[4]);
  const tip=document.getElementById('mTip');

  // ── ZIP DOTS ──
  svg.append('g').selectAll('.zip-dot')
    .data([...filtered].sort((a,b)=>a[2]-b[2]))
    .join('circle')
    .attr('class','zip-dot')
    .attr('cx',d=>{const p=proj([d[4],d[3]]);return p?p[0]:-999;})
    .attr('cy',d=>{const p=proj([d[4],d[3]]);return p?p[1]:-999;})
    .attr('r',d=>getR(d[2]))
    .attr('fill',d=>d3.interpolateRgb('#1a2030',BC[d[0]])(d[2]/9639))
    .attr('stroke',d=>BC[d[0]])
    .attr('stroke-width',d=>d[1]===activeZip?2.5:0.5)
    .attr('opacity',d=>activeZip?( d[1]===activeZip?1:0.5 ):0.82)
    .style('cursor','pointer')
    .on('mouseover',function(event,d){
      if(d[1]!==activeZip) d3.select(this).raise().attr('r',getR(d[2])*1.4).attr('opacity',1);
      const topC=(COMPLAINTS[d[1]]||[])[0];
      tip.style.opacity='1';
      tip.innerHTML=`<div class="mt-boro">${d[0]}</div><div class="mt-zip">${d[1]}</div><div class="mt-count">${d[2].toLocaleString()} unsolved</div>${topC?`<div class="mt-top">Top: ${topC[0]}</div>`:''}`;
    })
    .on('mousemove',function(event){
      const r=wrap.getBoundingClientRect();
      let x=event.clientX-r.left+14,y=event.clientY-r.top-12;
      if(x+175>W)x=event.clientX-r.left-185;
      tip.style.left=x+'px';tip.style.top=y+'px';
    })
    .on('mouseout',function(event,d){
      if(d[1]!==activeZip) d3.select(this).attr('r',getR(d[2])).attr('opacity',activeZip?0.5:0.82);
      tip.style.opacity='0';
    })
    .on('click',(event,d)=>{
      event.stopPropagation();
      if(activeZip===d[1]){closeDrawer();}else{selectZip(d[1],d[0],d[2]);}
    });

  // ── BOROUGH LABELS — drawn last so always on top of everything ──
  // Use hardcoded lat/lon centers for each borough for reliable placement
  const BORO_LABEL_CENTERS = [
    {name:'BRONX',         lon:-73.865, lat:40.855, rot:0,   fs:15, key:'BRONX'},
    {name:'MANHATTAN',     lon:-73.962, lat:40.780, rot:-55, fs:11, key:'MANHATTAN'},
    {name:'BROOKLYN',      lon:-73.955, lat:40.635, rot:0,   fs:14, key:'BROOKLYN'},
    {name:'QUEENS',        lon:-73.820, lat:40.740, rot:0,   fs:14, key:'QUEENS'},
    {name:'STATEN ISLAND', lon:-74.145, lat:40.570, rot:-30, fs:11, key:'STATEN ISLAND'}
  ];

  const labelG = svg.append('g').style('pointer-events','none');
  BORO_LABEL_CENTERS.forEach(d=>{
    const pt = proj([d.lon, d.lat]);
    if(!pt) return;
    const isActive = activeBorough===d.key || activeBorough==='ALL';
    const color = isActive ? BC[d.key] : 'rgba(255,255,255,0.15)';
    const lines = [d.name];
    const transform = `translate(${pt[0]},${pt[1]}) rotate(${d.rot})`;

    lines.forEach((line, i) => {
      const dy = (i - (lines.length-1)/2) * (d.fs * 1.3);
      // dark shadow
      labelG.append('text')
        .attr('transform', transform)
        .attr('text-anchor','middle')
        .attr('dy', dy + 'px')
        .attr('font-family','Syne,sans-serif')
        .attr('font-size', d.fs+'px')
        .attr('font-weight','800')
        .attr('fill','none')
        .attr('stroke','#0a0c10')
        .attr('stroke-width','6')
        .attr('stroke-linejoin','round')
        .attr('letter-spacing','0.1em')
        .attr('paint-order','stroke')
        .text(line);
      // colored text
      labelG.append('text')
        .attr('transform', transform)
        .attr('text-anchor','middle')
        .attr('dy', dy + 'px')
        .attr('font-family','Syne,sans-serif')
        .attr('font-size', d.fs+'px')
        .attr('font-weight','800')
        .attr('fill', color)
        .attr('letter-spacing','0.1em')
        .text(line);
    });
  });
}

/* ─────────────── PILLS ─────────────── */
function renderPills(){
  const boros=['ALL','BRONX','BROOKLYN','MANHATTAN','QUEENS','STATEN ISLAND'];
  const names=['All','Bronx','Brooklyn','Manhattan','Queens','S.Island'];
  document.getElementById('bpills').innerHTML=boros.map((b,i)=>{
    const color=b==='ALL'?'#e85d3a':BC[b];
    const active=activeBorough===b;
    return `<button class="bpill${active?' active':''}" 
      style="${active?`background:${color};border-color:${color};`:`border-color:${color}44;`}"
      onclick="setBorough('${b}')">${names[i]}</button>`;
  }).join('');
}

function setBorough(b){
  activeBorough=b;
  activeZip=null;
  document.getElementById('zipDrawer').classList.remove('open');
  renderPills();
  renderMap();
  updateSide();
  updateBoroughChart();
}

/* ─────────────── INIT ─────────────── */
function init(){
  const mapH=window.innerHeight-52;
  document.getElementById('mapWrap').style.height=mapH+'px';
  document.querySelector('.side').style.height=mapH+'px';
  document.querySelector('.zip-list-wrap').style.maxHeight=(mapH-200)+'px';
  renderPills();
  updateSide();
  updateBoroughChart();
  requestAnimationFrame(()=>requestAnimationFrame(()=>renderMap()));
}
if(document.readyState==='complete'){setTimeout(init,0);}
else{window.addEventListener('load',()=>setTimeout(init,0));}
window.addEventListener('resize',()=>{renderMap();});
window.setBorough=setBorough;
window.selectZip=selectZip;
window.closeDrawer=closeDrawer;
</script>
</body>
</html>
